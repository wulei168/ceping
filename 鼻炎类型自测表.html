<script>

        {val:"B", label:"一接触灰尘、打扫卫生、或躺在床上时就加重。"},

      ]},
      { id:32, text:"您是否曾因为长期的鼻炎问题，感到过焦虑、烦躁，或影响了正常的生活和工作/学习效率？", multi:false, options:[
        {val:"A", label:"是，影响很大，感觉生活质量严重下降。"},

      { id:33, text:"鼻塞时，您有没有用过一些能快速通气的减充血剂（如滴鼻净、羟甲唑啉、赛洛唑啉喷剂）？使用频率是？", multi:false, options:[
        {val:"A", label:"没用过。"},
        {val:"B", label:"偶尔在严重鼻塞影响呼吸和睡眠时用一下，但会控制天数。"},
        {val:"C", label:"经常用，感觉已经离不开它了，不用就完全堵死，一用就好几个小时。"},

      ]},
      { id:34, text:"当您侧躺时，哪边的鼻孔在下方，哪边就会鼻塞，反过来也一样吗？", multi:false, options:[
        {val:"A", label:"是的，会随着翻身交替堵塞。"},
        {val:"B", label:"不是，我是固定的一侧鼻塞，无论怎么躺都一样。"},
        {val:"C", label:"没注意过。【不确定】"}
      ]},
      { id:35, text:"您的鼻部不适，是否让您感觉同时伴有慢性的头部、颈部或肩背部的紧张和疼痛？", multi:false, options:[
        {val:"A", label:"是，感觉整个人都很紧绷。"},
        {val:"B", label:"没有这个感觉。"}
      ]}
    ];

    const container = document.getElementById('questionsContainer');
    function renderQuestions() {
      let html = '';
      questions.forEach((q) => {
        html += `<div class="question-card" id="q-${q.id}">
          <div class="question-title">
            <span class="q-num">${q.id}</span> ${q.text}
            ${q.multi ? '<span class="multi-badge">可多选</span>' : ''}
          </div>
          <div class="options">`;
        q.options.forEach(opt => {
          const inputType = q.multi ? 'checkbox' : 'radio';
          html += `<div class="option-item">
            <input type="${inputType}" name="q${q.id}" value="${opt.val}" id="q${q.id}_${opt.val}">
            <label for="q${q.id}_${opt.val}">${opt.label}</label>
          </div>`;
        });
        html += `</div></div>`;
      });
      container.innerHTML = html;
      document.querySelectorAll('#quizForm input').forEach(input => {
        input.addEventListener('change', updateProgress);
      });
    }

    function updateProgress() {
      let answered = 0;
      questions.forEach(q => {
        if (document.querySelectorAll(`input[name="q${q.id}"]:checked`).length > 0) answered++;
      });
      const percent = Math.round((answered / questions.length) * 100);
      document.getElementById('progressBar').style.width = percent + '%';
    }

    function collectCounts() {
      const counts = { A:0, B:0, C:0, D:0 };
      questions.forEach(q => {
        const checked = document.querySelectorAll(`input[name="q${q.id}"]:checked`);
        checked.forEach(cb => {
          if (cb.value in counts) counts[cb.value]++;
        });
      });
      return counts;
    }

    function getHighScoreTypes(counts, threshold = 0.6) {
      const max = Math.max(counts.A, counts.B, counts.C, counts.D);
      if (max === 0) return [];
      const types = [];
      if (counts.A >= max * threshold) types.push('A');
      if (counts.B >= max * threshold) types.push('B');
      if (counts.C >= max * threshold) types.push('C');
      if (counts.D >= max * threshold) types.push('D');
      return types;
    }

    function getSelectedAnswers() {
      const selected = {};
      questions.forEach(q => {
        const checked = document.querySelectorAll(`input[name="q${q.id}"]:checked`);
        if (checked.length > 0) {
          const labels = [];
          checked.forEach(cb => {
            const label = document.querySelector(`label[for="q${q.id}_${cb.value}"]`);
            if (label) labels.push(label.textContent.trim());
          });
          selected[q.id] = labels;
        }
      });
      return selected;
    }

    const knowledgeCategories = {
      A: "《过敏性鼻炎（尘螨/花粉/Th2主导型）》",
      B: "《屏障功能缺陷型》",
      C: "《毒性/代谢淤积型》",
      D: "《抗生素滥用/抵抗力缺陷型》"
    };

    const typeNames = {
      A: "过敏性鼻炎高风险",
      B: "屏障功能缺陷型高风险",
      C: "毒性/代谢淤积型高风险",
      D: "抗生素滥用/抵抗力缺陷型高风险"
    };

    const typeDetails = {
      A: `🔍 高风险线索：症状与过敏原相关，抗组胺药有效，常合并其他过敏问题。\n📋 建议方向：明确过敏原，环境控制，规范用药，评估脱敏治疗。\n🥗 膳食营养方向：控糖、Omega-3、维生素D、益生菌、槲皮素。`,
      B: `🔍 高风险线索：对冷空气、刺激气味敏感，抗过敏药效果差，皮肤干燥。\n📋 建议方向：停止破坏（加湿、避烟），修复黏膜（锌、维生素A、C），同步修复肠道。\n🥗 膳食营养方向：补充锌-维生素A-维生素C修复铁三角，益生菌，Omega-3。`,
      C: `🔍 高风险线索：高脂高糖饮食后加重，便秘，舌苔厚腻，皮肤出油。\n📋 建议方向：饮食净化，打通排泄，支持肝脏解毒。\n🥗 膳食营养方向：NAC、镁、水飞蓟素、姜黄素。`,
      D: `🔍 高风险线索：反复感染-抗生素循环，非感染期也鼻塞，消化不良。\n📋 建议方向：严格掌握抗生素指征，重建肠道菌群，纠正营养缺乏。\n🥗 膳食营养方向：高剂量多菌株益生菌、维生素D、锌、NAC。`
    };

    function generatePrompt(types, counts, selectedAnswers) {
      let prompt = "请根据以下鼻炎自测结果，生成个性化的膳食营养辅助方案。\n\n";
      prompt += "【高风险类型】\n";
      if (types.length === 0) {
        prompt += "未明确识别主导类型。\n";
      } else {
        types.forEach(t => prompt += `- ${typeNames[t]}\n`);
      }
      prompt += "\n【关键线索摘要】\n";
      for (let i = 1; i <= questions.length; i++) {
        if (selectedAnswers[i]) {
          const qText = questions[i-1].text;
          prompt += `- ${qText}：${selectedAnswers[i].join('；')}\n`;
        }
      }
      prompt += "\n【分类计数】\n";
      prompt += `A类（典型过敏）选项数量：${counts.A}\n`;
      prompt += `B类（屏障脆弱）选项数量：${counts.B}\n`;
      prompt += `C类（代谢淤积）选项数量：${counts.C}\n`;
      prompt += `D类（抗生素相关）选项数量：${counts.D}\n`;
      prompt += "\n请基于以上信息，结合安心滋养知识库中的鼻炎专题，提供包括膳食原则、营养补剂建议及干预要点的综合方案。";
      return prompt;
    }

    function generateResult(types, counts, selectedAnswers) {
      let html = '';
      if (types.length === 0) {
        html += `<div class="result-type">未能识别高风险类型</div><p>您可能选择了较多“不确定”选项。建议带着问卷中的问题，有意识地观察自己1-2周后重新测评。</p>`;
        return html;
      }

      if (types.length === 1) {
        const type = types[0];
        html += `<div class="result-type">📌 ${typeNames[type]}</div>`;
        html += `<div class="result-sub">基于您的自测结果，提示您可能存在该类型的鼻炎倾向。</div>`;
        html += `<div class="result-detail">${typeDetails[type]}</div>`;
        html += `<div class="result-advice"><strong>📖 下一步：</strong>请前往安心滋养知识库，查阅<strong>${knowledgeCategories[type]}</strong>专题，获取完整的干预思路。</div>`;
      } else {
        const names = types.map(t => typeNames[t]).join(' 与 ');
        html += `<div class="result-type">📌 混合类型高风险</div>`;
        html += `<div class="result-sub">您的情况较为复杂，呈现多种类型的特征。</div>`;
        html += `<div class="result-detail">🔗 混合类型干预原则：按“先解决排泄和感染，再修复屏障，最后调节免疫”的顺序。<br><br>`;
        types.forEach(t => html += `▶ ${typeNames[t]}：<br>${typeDetails[t]}<br><br>`);
        html += `</div>`;
        const categoryList = types.map(t => knowledgeCategories[t]).join('、');
        html += `<div class="result-advice"><strong>📖 下一步：</strong>请结合安心滋养知识库中的<strong>${categoryList}</strong>专题。</div>`;
      }

      const promptText = generatePrompt(types, counts, selectedAnswers);
      html += `
        <div class="ai-prompt-box">
          <h3>🤖 AI个性化方案提示词</h3>
          <p style="font-size:0.9rem; margin-bottom:0.6rem;">复制以下内容，粘贴到任意AI助手，即可获得针对您情况的初步膳食营养建议。</p>
          <div class="ai-prompt-text" id="aiPromptText">${escapeHtml(promptText)}</div>
          <button class="copy-btn" id="copyPromptBtn">📋 一键复制提示词</button>
        </div>
      `;
      return html;
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showResults() {
      const counts = collectCounts();
      const types = getHighScoreTypes(counts);
      const selectedAnswers = getSelectedAnswers();
      const resultDiv = document.getElementById('resultContent');
      resultDiv.innerHTML = generateResult(types, counts, selectedAnswers);
      document.getElementById('resultContainer').style.display = 'block';
      window.scrollTo({ top: document.getElementById('resultContainer').offsetTop - 50, behavior: 'smooth' });

      const copyBtn = document.getElementById('copyPromptBtn');
      if (copyBtn) {
        copyBtn.addEventListener('click', function() {
          const promptText = document.getElementById('aiPromptText').textContent;
          navigator.clipboard.writeText(promptText).then(() => {
            copyBtn.textContent = '✅ 已复制';
            setTimeout(() => { copyBtn.textContent = '📋 一键复制提示词'; }, 2000);
          });
        });
      }
    }

    function resetQuiz() {
      document.querySelectorAll('#quizForm input').forEach(input => input.checked = false);
      document.getElementById('resultContainer').style.display = 'none';
      document.getElementById('progressBar').style.width = '0%';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderQuestions();
    document.getElementById('submitBtn').addEventListener('click', function() {
      let answered = 0;
      questions.forEach(q => {
        if (document.querySelectorAll(`input[name="q${q.id}"]:checked`).length > 0) answered++;
      });
      if (answered < questions.length * 0.7) {
        alert(`您还有 ${questions.length - answered} 题未作答。为了结果更准确，建议至少完成70%的题目。`);
      }
      showResults();
    });
    document.getElementById('resetBtn').addEventListener('click', resetQuiz);
  })();
</script>
