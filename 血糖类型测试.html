<script>
    // 三种类型定义及膳食建议
    const TYPES = {

            ]
        },
        ir: {

            short: "抵抗型",
            desc: "身体对胰岛素不敏感，常伴有腹型肥胖、餐后困倦、黑棘皮、脂肪肝或多囊卵巢综合征。",
            diet: [
                "🥗 控制总热量，每餐深色蔬菜占一半",
                "🍗 足量优质蛋白（鱼、蛋、豆制品、瘦肉）提高肌肉量",
                "🥑 增加Omega-3（三文鱼、亚麻籽油）和单不饱和脂肪（橄榄油）",
                "🍎 低GI水果作为加餐，而非饭后",
                "🏋️ 增加抗阻力训练（深蹲、弹力带）改善胰岛素敏感性"
            ]
        },
        liver: {
            name: "🌙 肝源性空腹高血糖型（黎明现象倾向）",
            short: "肝源型",
            desc: "肝脏夜间输出过多葡萄糖，导致清晨空腹血糖偏高，可能伴有夜间易醒、口干、晨起乏力。",
            diet: [
                "🌜 睡前2小时少量优质蛋白（酸奶/几颗杏仁/半个鸡蛋）",
                "🍽️ 晚餐碳水减半，增加绿叶蔬菜，避免晚餐过饱",
                "🍵 晚餐时喝一小勺苹果醋兑水（有助于抑制肝糖输出）",
                "🕙 保持规律睡眠，戒深夜饮酒和宵夜",
                "🌿 多吃十字花科蔬菜（西兰花、卷心菜）支持肝脏代谢"
            ]
        }
    };

    // 用户基础信息
    let userData = {
        age: null,
        gender: null,
        height: null,
        weight: null,
        bmi: null,
        diseases: []      // 存储疾病代码
    };

    // 病史多选选项
    const diseaseOptions = [
        { val: "fatty_liver", label: "非酒精性脂肪肝" },
        { val: "pcos", label: "多囊卵巢综合征 (PCOS)" },
        { val: "hypertension", label: "高血压" },
        { val: "gestational_dm", label: "妊娠期糖尿病史" },
        { val: "family_t2d", label: "直系亲属2型糖尿病" },
        { val: "hyperlipid", label: "高血脂/高甘油三酯" }
    ];

    // 核心问题列表（15个问题）
    const CORE_QUESTIONS = [
        { // 0
            text: "吃完一顿高碳水正餐（白米饭/面条/馒头）后1小时内，您最常出现？",
            multi: false,
            options: [
                { text: "无特殊不适，精力正常", scores: { spike:0, ir:0, liver:0 } },
                { text: "明显犯困、想睡觉", scores: { spike:1, ir:2, liver:0 } },
                { text: "心慌、手抖、出冷汗（低血糖样反应）", scores: { spike:3, ir:0, liver:0 } },
                { text: "腹部胀满或沉重感", scores: { spike:0, ir:1, liver:0 } }
            ]
        },
        { // 1
            text: "同一餐后2~3小时（下一餐前），您最常出现？",
            multi: false,
            options: [
                { text: "一切正常，到下餐才有饿感", scores: { spike:0, ir:0, liver:0 } },
                { text: "轻微饥饿，但能忍受", scores: { spike:1, ir:0, liver:0 } },
                { text: "强烈饥饿，伴有心慌/手抖", scores: { spike:3, ir:1, liver:0 } },
                { text: "极度疲劳、头晕、注意力不集中", scores: { spike:2, ir:1, liver:0 } }
            ]
        },
        { // 2
            text: "您是否存在以下皮肤或体型特征？（可多选）",
            multi: true,
            options: [
                { text: "颈后/腋下/腹股沟皮肤粗糙、颜色加深（黑棘皮）", scores: { spike:0, ir:3, liver:0 } },
                { text: "腰围明显偏大（男性≥90cm，女性≥85cm）", scores: { spike:0, ir:2, liver:0 } },
                { text: "四肢纤细但腹部肥胖", scores: { spike:0, ir:2, liver:0 } },
                { text: "体重正常但腰腹有赘肉", scores: { spike:0, ir:1, liver:0 } }
            ]
        },
        { // 3
            text: "关于清晨空腹状态，您符合哪一项？",
            multi: false,
            options: [
                { text: "精神好，无口干", scores: { spike:0, ir:0, liver:0 } },
                { text: "口干、口苦，有时头晕", scores: { spike:0, ir:0, liver:2 } },
                { text: "清晨容易饿醒或夜里醒1次以上", scores: { spike:0, ir:0, liver:3 } },
                { text: "晨起后感觉像没睡醒，乏力明显", scores: { spike:0, ir:1, liver:1 } }
            ]
        },
        { // 4
            text: "您夜间睡眠中是否出现以下情况？（可多选）",
            multi: true,
            options: [
                { text: "几乎没有异常", scores: { spike:0, ir:0, liver:0 } },
                { text: "凌晨3-4点左右易醒", scores: { spike:0, ir:0, liver:2 } },
                { text: "夜间盗汗或心慌醒来", scores: { spike:2, ir:0, liver:1 } },
                { text: "需要起夜小便2次以上", scores: { spike:0, ir:1, liver:1 } }
            ]
        },
        { // 5
            text: "您的饮食习惯更符合？",
            multi: false,
            options: [
                { text: "三餐规律，主食粗细搭配", scores: { spike:0, ir:0, liver:0 } },
                { text: "喜欢米面、甜食、含糖饮料", scores: { spike:2, ir:1, liver:0 } },
                { text: "晚餐吃得多，常吃夜宵", scores: { spike:0, ir:1, liver:2 } },
                { text: "进食速度快，容易吃撑", scores: { spike:0, ir:1, liver:0 } }
            ]
        },
        { // 6
            text: "您每周中等强度运动（快走、慢跑、游泳）总时长？",
            multi: false,
            options: [
                { text: "≥150分钟", scores: { spike:0, ir:0, liver:0 } },
                { text: "90-149分钟", scores: { spike:0, ir:1, liver:0 } },
                { text: "30-89分钟", scores: { spike:0, ir:2, liver:0 } },
                { text: "<30分钟或基本不运动", scores: { spike:0, ir:3, liver:0 } }
            ]
        },
        { // 7
            text: "以下压力与睡眠情况，您符合哪项？",
            multi: false,
            options: [
                { text: "睡眠充足，压力小", scores: { spike:0, ir:0, liver:0 } },
                { text: "长期熬夜或睡眠不足6小时", scores: { spike:0, ir:1, liver:1 } },
                { text: "工作/生活压力大，皮质醇偏高", scores: { spike:0, ir:1, liver:1 } },
                { text: "同时存在熬夜+压力大", scores: { spike:0, ir:2, liver:2 } }
            ]
        },
        { // 8
            text: "您是否曾被诊断以下疾病？（可多选）",
            multi: true,
            options: [
                { text: "脂肪肝", scores: { spike:0, ir:3, liver:0 } },
                { text: "多囊卵巢综合征 (PCOS)", scores: { spike:0, ir:3, liver:0 } },
                { text: "高血压", scores: { spike:0, ir:2, liver:0 } },
                { text: "高尿酸/痛风", scores: { spike:0, ir:1, liver:0 } }
            ]
        },
        { // 9
            text: "关于甜食或含糖饮料后的感受？",
            multi: false,
            options: [
                { text: "无明显不适", scores: { spike:0, ir:0, liver:0 } },
                { text: "短时精神好，1-2小时后更累更饿", scores: { spike:2, ir:1, liver:0 } },
                { text: "容易胃胀反酸", scores: { spike:0, ir:0, liver:1 } },
                { text: "几乎不吃甜食", scores: { spike:0, ir:0, liver:0 } }
            ]
        },
        { // 10
            text: "如果您晚餐吃得较晚或较多，第二天清晨通常？",
            multi: false,
            options: [
                { text: "无明显变化", scores: { spike:0, ir:0, liver:0 } },
                { text: "口干口苦，空腹感偏高", scores: { spike:0, ir:0, liver:3 } },
                { text: "犯困头晕", scores: { spike:0, ir:0, liver:1 } },
                { text: "夜间易醒多梦", scores: { spike:0, ir:0, liver:2 } }
            ]
        },
        { // 11: 低血糖发作频率
            text: "在过去3个月中，您出现过几次心慌、手抖、出冷汗且进食后很快缓解的情况？",
            multi: false,
            options: [
                { text: "0次", scores: { spike:0, ir:0, liver:0 } },
                { text: "1-2次", scores: { spike:1, ir:0, liver:0 } },
                { text: "3-5次", scores: { spike:2, ir:0, liver:0 } },
                { text: "≥6次", scores: { spike:3, ir:0, liver:0 } }
            ]
        },
        { // 12: 家族史细化
            text: "您的父母或亲兄弟姐妹中，有几人患2型糖尿病？",
            multi: false,
            options: [
                { text: "0人", scores: { spike:0, ir:0, liver:0 } },
                { text: "1人", scores: { spike:1, ir:1, liver:0 } },
                { text: "≥2人", scores: { spike:2, ir:2, liver:0 } }
            ]
        },
        { // 13: 夜间低血糖警示（不计分但用于提示）
            text: "您是否曾在睡眠中因心慌、噩梦或出冷汗而惊醒？",
            multi: false,
            options: [
                { text: "从未", scores: { spike:0, ir:0, liver:0 } },
                { text: "偶尔（一年几次）", scores: { spike:1, ir:0, liver:0 } },
                { text: "经常（每月一次或更多）", scores: { spike:2, ir:0, liver:0 } }
            ]
        },
        { // 14: 腰围精确估算
            text: "您的腰围大约是多少？（可大致估算）",
            multi: false,
            options: [
                { text: "男性<85cm / 女性<80cm", scores: { spike:0, ir:0, liver:0 } },
                { text: "男性85-94cm / 女性80-89cm", scores: { spike:0, ir:1, liver:0 } },
                { text: "男性95-104cm / 女性90-99cm", scores: { spike:0, ir:2, liver:0 } },
                { text: "男性≥105cm / 女性≥100cm", scores: { spike:0, ir:3, liver:0 } }
            ]
        }
    ];

    let coreAnswers = []; // 每个元素：单选存索引，多选存选中的索引数组
    let currentStep = 0;  // 0:基础信息, 1..15: 核心问题, 最后=结果

    function initAnswers() {
        coreAnswers = CORE_QUESTIONS.map(q => q.multi ? [] : null);
    }

    // 从DOM同步基础信息到userData（用于疾病点击时保存当前输入）
    function syncBasicInfoFromDOM() {
        const ageInput = document.getElementById('age');
        const genderSelect = document.getElementById('gender');
        const heightInput = document.getElementById('height');
        const weightInput = document.getElementById('weight');
        if (ageInput) userData.age = parseInt(ageInput.value) || null;
        if (genderSelect) userData.gender = genderSelect.value || null;
        if (heightInput) userData.height = parseFloat(heightInput.value) || null;
        if (weightInput) userData.weight = parseFloat(weightInput.value) || null;
    }

    function computeScoresFromQuestions() {
        let scores = { spike: 0, ir: 0, liver: 0 };
        for (let i = 0; i < CORE_QUESTIONS.length; i++) {
            const q = CORE_QUESTIONS[i];
            const ans = coreAnswers[i];
            if (ans === null || (q.multi && ans.length === 0)) continue;
            if (!q.multi) {
                const optScores = q.options[ans].scores;
                scores.spike += optScores.spike || 0;
                scores.ir += optScores.ir || 0;
                scores.liver += optScores.liver || 0;
            } else {
                for (let idx of ans) {
                    const optScores = q.options[idx].scores;
                    scores.spike += optScores.spike || 0;
                    scores.ir += optScores.ir || 0;
                    scores.liver += optScores.liver || 0;
                }
            }
        }
        return scores;
    }

    function addBaseInfoScores(baseScores) {
        if (userData.diseases.includes('fatty_liver')) { baseScores.ir += 2; baseScores.liver += 1; }
        if (userData.diseases.includes('pcos')) { baseScores.ir += 3; }
        if (userData.diseases.includes('hypertension')) { baseScores.ir += 1; }
        if (userData.diseases.includes('gestational_dm')) { baseScores.spike += 1; baseScores.ir += 1; }
        if (userData.diseases.includes('family_t2d')) { baseScores.ir += 1; baseScores.spike += 0.5; }
        if (userData.diseases.includes('hyperlipid')) { baseScores.ir += 1; }
        if (userData.bmi >= 28) baseScores.ir += 2;
        else if (userData.bmi >= 24) baseScores.ir += 1;
        if (userData.age >= 45) { baseScores.ir += 0.5; baseScores.liver += 0.5; }
        if (userData.age >= 60) { baseScores.ir += 0.5; baseScores.liver += 0.5; }
        return baseScores;
    }

    function getDominantAndMix(scores) {
        let entries = Object.entries(scores);
        entries.sort((a,b) => b[1] - a[1]);
        let first = entries[0][0], firstScore = entries[0][1];
        let second = entries[1][0], secondScore = entries[1][1];
        if (firstScore <= 2.5) return { primary: null, secondary: null, lowSignal: true };
        let mixed = (secondScore >= firstScore * 0.6) && (firstScore - secondScore <= 2.5);
        if (mixed) return { primary: first, secondary: second, isMixed: true, lowSignal: false };
        else return { primary: first, secondary: null, isMixed: false, lowSignal: false };
    }

    const app = document.getElementById('app');

    function render() {
        if (currentStep === 0) renderBasicInfo();
        else if (currentStep >= 1 && currentStep <= CORE_QUESTIONS.length) renderCoreQuestion(currentStep-1);
        else renderResult();
    }

    function renderBasicInfo() {
        // 确保userData中的bmi在身高体重变化后重新计算（但不要在渲染时重复计算）
        let html = `
            <div class="card">
                <div class="progress-area"><div class="progress-label"><span>📋 基础信息</span><span>必填</span></div></div>
                <div class="question-text">👤 为了更准确，请填写以下资料</div>
                <div class="form-row">
                    <label>年龄</label>
                    <input type="number" id="age" placeholder="岁" value="${userData.age || ''}">
                </div>
                <div class="form-row">
                    <label>性别</label>
                    <select id="gender">
                        <option value="">选择</option>
                        <option value="male" ${userData.gender === 'male' ? 'selected' : ''}>男</option>
                        <option value="female" ${userData.gender === 'female' ? 'selected' : ''}>女</option>
                    </select>
                </div>
                <div class="inline-group">
                    <div><label>身高 (cm)</label><input type="number" id="height" placeholder="cm" value="${userData.height || ''}"></div>
                    <div><label>体重 (kg)</label><input type="number" id="weight" placeholder="kg" value="${userData.weight || ''}"></div>
                </div>
                <div class="form-row">
                    <label>曾确诊以下疾病？（可多选）</label>
                    <div class="options" id="diseaseList"></div>
                </div>
                <div class="nav-buttons">
                    <button class="btn" disabled style="visibility:hidden;"></button>
                    <button class="btn btn-primary" id="nextBasic">下一步 →</button>
                </div>
                <div class="medical-note">💡 病史与体型对胰岛素抵抗影响较大，请如实填写。</div>
            </div>
        `;
        app.innerHTML = html;
        const diseaseContainer = document.getElementById('diseaseList');
        diseaseOptions.forEach(d => {
            const div = document.createElement('div');
            div.className = `option-item multi-option`;
            div.setAttribute('data-val', d.val);
            div.innerHTML = `<span>${d.label}</span><span class="multi-badge">${userData.diseases.includes(d.val) ? '✓' : '未选'}</span>`;
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                // 先同步当前表单数据到 userData
                syncBasicInfoFromDOM();
                // 切换疾病选中状态
                if (userData.diseases.includes(d.val)) {
                    userData.diseases = userData.diseases.filter(v => v !== d.val);
                } else {
                    userData.diseases.push(d.val);
                }
                // 重新渲染基础信息页面，此时 userData 已包含最新表单值和疾病
                renderBasicInfo();
            });
            diseaseContainer.appendChild(div);
        });
        document.getElementById('nextBasic').addEventListener('click', () => {
            syncBasicInfoFromDOM(); // 确保获取最新输入
            let age = userData.age;
            let gender = userData.gender;
            let height = userData.height;
            let weight = userData.weight;
            if (!age || age<18 || age>110) { alert("请填写有效年龄（18-110）"); return; }
            if (!gender) { alert("请选择性别"); return; }
            if (!height || height<100 || height>250) { alert("身高范围100-250cm"); return; }
            if (!weight || weight<20 || weight>300) { alert("体重范围20-300kg"); return; }
            let bmi = weight / ((height/100)**2);
            userData.bmi = parseFloat(bmi.toFixed(1));
            currentStep = 1;
            initAnswers();
            render();
        });
    }

    function renderCoreQuestion(idx) {
        const q = CORE_QUESTIONS[idx];
        const isMulti = q.multi;
        const currentAnswer = coreAnswers[idx];
        const progressPercent = (idx / CORE_QUESTIONS.length) * 100;
        let html = `
            <div class="card">
                <div class="progress-area">
                    <div class="progress-label"><span>问题 ${idx+1}/${CORE_QUESTIONS.length}</span><span>${Math.round(progressPercent)}%</span></div>
                    <div class="progress-bar-bg"><div class="progress-fill" style="width: ${progressPercent}%;"></div></div>
                </div>
                <div class="question-text">${q.text}</div>
                ${isMulti ? '<div class="hint">✔️ 可多选，点击选项切换选中状态</div>' : ''}
                <div class="options" id="optionsContainer"></div>
                <div class="nav-buttons">
                    <button class="btn" id="prevBtn">← 上一步</button>
                    <button class="btn btn-primary" id="nextBtn">${idx === CORE_QUESTIONS.length-1 ? '查看结果' : '下一步 →'}</button>
                </div>
            </div>
        `;
        app.innerHTML = html;
        const container = document.getElementById('optionsContainer');
        q.options.forEach((opt, optIdx) => {
            let isSelected = false;
            if (isMulti) {
                isSelected = currentAnswer && Array.isArray(currentAnswer) && currentAnswer.includes(optIdx);
            } else {
                isSelected = (currentAnswer === optIdx);
            }
            const div = document.createElement('div');
            div.className = `option-item ${isSelected ? 'selected' : ''}`;
            div.innerHTML = `<span class="option-prefix">${String.fromCharCode(65+optIdx)}</span><span>${opt.text}</span>`;
            div.addEventListener('click', () => {
                if (isMulti) {
                    let arr = coreAnswers[idx] ? [...coreAnswers[idx]] : [];
                    if (arr.includes(optIdx)) {
                        arr = arr.filter(i => i !== optIdx);
                    } else {
                        arr.push(optIdx);
                    }
                    coreAnswers[idx] = arr;
                } else {
                    coreAnswers[idx] = optIdx;
                }
                renderCoreQuestion(idx);
            });
            container.appendChild(div);
        });
        document.getElementById('prevBtn').addEventListener('click', () => {
            if (idx > 0) { currentStep--; render(); }
            else { currentStep = 0; render(); }
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
            const ans = coreAnswers[idx];
            if (isMulti && (!ans || ans.length===0)) { alert("请至少选择一个选项"); return; }
            if (!isMulti && ans === null) { alert("请选择一个选项"); return; }
            if (idx === CORE_QUESTIONS.length-1) {
                currentStep = CORE_QUESTIONS.length + 1;
                render();
            } else {
                currentStep++;
                render();
            }
        });
    }

    function renderResult() {
        let rawScores = computeScoresFromQuestions();
        let finalScores = addBaseInfoScores(rawScores);
        const mixInfo = getDominantAndMix(finalScores);
        const primaryType = mixInfo.primary;
        const secondaryType = mixInfo.secondary;
        const lowSignal = mixInfo.lowSignal;
        let nightHypoAlert = false;
        if (coreAnswers[12] !== undefined && coreAnswers[12] !== null && !Array.isArray(coreAnswers[12]) && (coreAnswers[12] === 1 || coreAnswers[12] === 2)) {
            nightHypoAlert = true;
        }
        let resultHtml = `<div class="result-card">
            <div class="result-type">
                ${lowSignal ? '📊 血糖模式平稳 / 轻微倾向' : (primaryType ? TYPES[primaryType].name : '血糖代谢倾向不明显')}
                ${(!lowSignal && mixInfo.isMixed && secondaryType) ? `<span class="type-badge mix-tag">混合 · 兼有${TYPES[secondaryType].short}</span>` : ''}
            </div>
            <div class="type-badge">基于15项症状+基础信息评分</div>
            <p>${lowSignal ? '您的得分未明显指向某一特定类型，可能血糖调节相对平稳，或生活习惯波动较大。建议保持均衡膳食，记录餐后感受进一步观察。' : (primaryType ? TYPES[primaryType].desc : '暂无明显倾向，继续保持健康生活。')}</p>`;
        if (!lowSignal && primaryType) {
            resultHtml += `<div class="diet-tips"><strong>🥗 膳食干预重点（${TYPES[primaryType].name}）</strong><ul>`;
            TYPES[primaryType].diet.forEach(tip => { resultHtml += `<li>${tip}</li>`; });
            resultHtml += `</ul>`;
            if (mixInfo.isMixed && secondaryType) {
                resultHtml += `<hr><strong>🔄 兼有「${TYPES[secondaryType].name}」倾向 · 额外注意</strong><ul>`;
                TYPES[secondaryType].diet.slice(0,2).forEach(tip => { resultHtml += `<li>✨ ${tip}</li>`; });
                resultHtml += `</ul>`;
            }
            resultHtml += `</div>`;
        } else if (lowSignal) {
            resultHtml += `<div class="diet-tips"><strong>🌿 血糖平稳通用建议</strong><ul>
                <li>🥬 每餐蔬菜占一半，主食粗细搭配</li>
                <li>🍗 蛋白质与碳水同餐，避免单独高糖食物</li>
                <li>🚶 餐后散步10分钟</li>
                <li>💤 保证睡眠，减少精制糖</li>
            </ul></div>`;
        }
        if (nightHypoAlert) {
            resultHtml += `<div class="medical-note" style="background:#ffe6e6; color:#b00020;">⚠️ 您报告了夜间低血糖相关症状（心慌/噩梦/冷汗），这可能影响空腹血糖。建议就医排查Somogyi效应，切勿自行调整饮食。</div>`;
        }
        resultHtml += `<div class="medical-note">
            📌 本工具基于15个症状与生活习惯问题评分，简单直观。<br>
            ⚠️ 若您有1型糖尿病、妊娠期糖尿病或正在使用激素，以上建议需遵医嘱。如血糖显著异常，请尽快就医。
        </div>
        <button class="btn reset-btn" id="resetAll">重新测试</button></div>`;
        app.innerHTML = resultHtml;
        document.getElementById('resetAll')?.addEventListener('click', () => {
            userData = { age: null, gender: null, height: null, weight: null, bmi: null, diseases: [] };
            coreAnswers = [];
            currentStep = 0;
            render();
        });
    }

    render();
</script>
</body>
</html>
