<div class="container">
    <div class="header">
        <h1>🍽️ 挑食类型快速自查表</h1>
        <div class="sub">2-12岁儿童 · 尤其关注ADHD儿童的感官与执行功能特点</div>
    </div>

    <div id="safetyCard" class="card">
        <div class="principle-box">
            <strong>📋 使用说明</strong><br>
            • 请根据孩子近1-3个月的日常表现，勾选“是”或“否”，不必纠结“有时候”。<br>
            • 孩子可能同时符合多种类型，请以勾选数量最多的为主要干预方向。<br>
            • 如果两种类型得分接近（相差≤1分），说明挑食由多重因素叠加，需综合应对。<br>
            • 本自查表适用于2-12岁儿童，ADHD儿童常见感官敏感型和环境干扰型得分较高。
        </div>
        <label style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
            <input type="checkbox" id="agreeCheck"> 我已阅读使用说明，开始评估
        </label>
        <button id="startBtn" disabled>开始填写问卷</button>
    </div>

    <div id="questionnaire" style="display: none;"></div>
    <div id="resultArea" style="display: none;"></div>
    <div class="footer-note">⚠️ 本评估仅供参考，不能替代专业医疗意见。持续严重挑食建议咨询儿科或营养科医生。</div>
</div>

    function renderQuestionnaire() {
        let html = `<form id="surveyForm">`;
        for (let g of groups) {
            html += `<div class="group-title">${g.name}（${g.code}组）</div>`;
            g.items.forEach((text, idx) => {
                const qid = `${g.code}_${idx}`;
                html += `<div class="question-row">
                            <div class="question-text">${text}</div>
                            <div class="options">
                                <label><input type="radio" name="${qid}" value="1"> 是</label>
                                <label><input type="radio" name="${qid}" value="0" checked> 否</label>
                            </div>
                        </div>`;
            });
        }
        html += `<button type="button" id="submitBtn">查看详细测评报告</button></form>`;
        document.getElementById('questionnaire').innerHTML = html;
        document.getElementById('submitBtn').addEventListener('click', computeResult);
    }

    function computeResult() {
        // 重置得分
        scores = { A:0, B:0, C:0, D:0, E:0 };
        let totalPerGroup = { A:8, B:8, C:8, D:8, E:8 };
        for (let g of groups) {
            let groupScore = 0;
            for (let i = 0; i < g.items.length; i++) {
                const qid = `${g.code}_${i}`;
                const selected = document.querySelector(`input[name="${qid}"]:checked`);
                if (selected && selected.value === "1") groupScore++;
            }
            scores[g.code] = groupScore;
        }

        // 找出最高分和次高分
        let sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
        let primaryCode = sorted[0][0];
        let primaryScore = sorted[0][1];
        let secondaryCode = sorted[1][0];
        let secondaryScore = sorted[1][1];
        let isMixed = (primaryScore - secondaryScore) <= 1 && secondaryScore >= 4;

        // 获取类型详情
        const primaryDetail = typeDetails[primaryCode];
        const secondaryDetail = secondaryCode ? typeDetails[secondaryCode] : null;

        // 构建结果HTML
        let resultHtml = `<div class="result-area">
            <h3>📊 评估结果：${primaryDetail.name}</h3>
            <div class="score-card">
                ${Object.entries(scores).map(([code, sc]) => `<div class="score-item"><div>${typeDetails[code].name}</div><div class="score-value">${sc}/8</div></div>`).join('')}
            </div>`;

        if (isMixed) {
            resultHtml += `<div class="principle-box" style="background:#fef0d9;"><strong>🔍 综合型挑食提示</strong><br>
            您的孩子在 ${primaryDetail.name}（${primaryScore}分）和 ${secondaryDetail.name}（${secondaryScore}分）两个类型得分非常接近，说明挑食由多重因素共同驱动。建议先以最影响日常功能（如食欲节律紊乱导致营养摄入不足，或行为对抗导致每餐都像战争）的类型作为优先干预起点，稳定后再处理第二个维度。</div>`;
        }

        // 核心特征解读
        resultHtml += `<div class="divider"></div>
        <h4>🧩 核心特征解读</h4>
        <p><strong>${primaryDetail.core}</strong></p>
        <p>常见表现：${primaryDetail.common.join("、")}。</p>
        <p><strong>与ADHD的关联：</strong> ${primaryDetail.adhd_link}</p>`;

        // 需要重点阅读的误区
        resultHtml += `<div class="misuse-list"><strong>⚠️ 需要重点阅读的误区章节</strong><br>${primaryDetail.missteps.map(m => `• ${m}`).join('<br>')}</div>`;

        // 干预方案
        resultHtml += `<div class="action-steps"><strong>🎯 分步干预方案（从最容易的一步开始）</strong><br>${primaryDetail.intervention.map(s => `<div style="margin-bottom: 8px;">${s}</div>`).join('')}</div>`;

        // 如果是混合型，增加第二个类型的补充建议
        if (isMixed && secondaryDetail) {
            resultHtml += `<div class="divider"></div><h4>🔄 次要类型 "${secondaryDetail.name}" 的补充建议</h4>
            <p>当您处理完主要类型的核心冲突后，可参照以下方向叠加干预：</p>
            <div class="action-steps" style="background:#faf2e2;">${secondaryDetail.intervention.slice(0,3).map(s => `<div style="margin-bottom: 6px;">${s}</div>`).join('')}</div>`;
        }

        // 综合通用建议 + 给家长的提醒
        resultHtml += `<div class="divider"></div>
        <div class="principle-box"><strong>💡 给家长的提醒</strong><br>
        • 类型不是固定不变的。随着干预和孩子成长，主要类型可能迁移。<br>
        • 得分高低不代表“问题严重程度”，只代表该类型的特征更为集中。<br>
        • 如果你感觉“好像每种都有点”，别焦虑。选择得分最高的1-2个类型作为起点即可。<br>
        • ADHD儿童的挑食往往需要更长的干预周期和更多的重复暴露。进步的单位是“月”，不是“天”。<br>
        • 建议从最小、最容易成功的一项调整开始（如“固定零食窗口”“关掉电视吃一餐”），积累成功体验后再逐步扩展。
        </div>`;

        resultHtml += `<button id="restartBtn">重新填写问卷</button></div>`;
        document.getElementById('questionnaire').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('resultArea').innerHTML = resultHtml;
        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('questionnaire').style.display = 'block';
            document.getElementById('resultArea').style.display = 'none';
            renderQuestionnaire();
        });
    }

    // 启动交互
    document.getElementById('startBtn').addEventListener('click', () => {
        document.getElementById('safetyCard').style.display = 'none';
        document.getElementById('questionnaire').style.display = 'block';
        renderQuestionnaire();
    });
    const agreeCheck = document.getElementById('agreeCheck');
    const startBtn = document.getElementById('startBtn');
    agreeCheck.addEventListener('change', () => { startBtn.disabled = !agreeCheck.checked; });
</script>
</body>
</html>
