        button {

        }
        button.primary {

        }
        button.primary:hover {

        button:hover {

        .result-box {

<body>
<div class="container">
    <div class="header">
        <div class="main-title">🌸 月经不调功能医学自测表</div>
        <div class="subtitle">安心滋养 · 饮食干预计划 旗下测评工具</div>
        <div class="disclaimer">
            ⚕️ 温馨提示：本测评仅作为饮食调理与健康评估的参考，不能替代专业医疗诊断。如月经问题持续或伴有严重疼痛、大量出血、闭经等，请及时就医。
        </div>
    </div>

    <div class="progress-section">
        <span class="badge">🌿 基于七种功能医学分型</span>
        <span class="q-counter" id="qCounter">加载中...</span>
    </div>

    <form id="quizForm">
        <div id="questionsContainer"></div>
        <div class="btn-group">
            <button type="button" id="resetBtn">🗑️ 重置所有</button>
            <button type="button" id="submitBtn" class="primary">📊 查看我的体质类型</button>
        </div>
    </form>

    <div id="resultArea" class="result-box" style="display: none;"></div>
    <div class="footer-note">
        ✨ 根据您的回答，系统将匹配最可能的月经不调功能医学类型，并提供对应的饮食干预方向（参考七大类：胰岛素抵抗型、雌激素优势型、甲状腺功能低下型、高泌乳素型、炎症痛经型、肠道菌群型、压力/HPA轴型）。
    </div>
</div>

<script>
    // ---------- 七大类定义 ----------
    const TYPES = {
        INSULIN: "① 胰岛素抵抗/代谢综合征型",
        ESTROGEN: "② 雌激素优势/黄体功能不足型",
        THYROID: "③ 甲状腺功能低下型",
        PROLACTIN: "④ 高泌乳素血症型",
        INFLAMM: "⑤ 炎症/前列腺素型 (痛经为主)",
        GUT_ESTRO: "⑥ 肠道菌群失调/雌激素再吸收型",
        STRESS: "⑦ 压力/HPA轴紊乱型"
    };

    // ---------- 题目定义（共66题，包含周期过短、过长、不规律、痛经等）----------
    // 新增周期过短相关题目，并保持各类型数量均衡
    const questions = [
        // ==== 症状定位题（不计入分型评分，但用于结果展示）====
        { text: "【症状定位】您的月经周期通常是？", typeKey: "SYMPTOM", isSymptom: true, optionsText: ["<21天(过短)","21-35天(正常)","35-45天(偏长)",">45天或闭经","完全不规律"] },
        { text: "【症状定位】经期长度（出血天数）？", typeKey: "SYMPTOM", isSymptom: true, optionsText: ["<3天","3-7天",">7天"] },
        { text: "【症状定位】月经量大约如何？", typeKey: "SYMPTOM", isSymptom: true, optionsText: ["很少（点滴即净）","中等","很多（每1-2小时需换卫生巾）","有大量血块"] },
        { text: "【症状定位】痛经程度？", typeKey: "SYMPTOM", isSymptom: true, optionsText: ["无","轻度（不影响生活）","中度（需止痛药）","重度（卧床）"] },
        { text: "【症状定位】非经期出血（经间期或接触性出血）？", typeKey: "SYMPTOM", isSymptom: true, optionsText: ["无","偶尔有","经常有"] },
        
        // 胰岛素抵抗型 (INSULIN) 9题
        { text: "您的月经周期经常大于35天（或每年少于8次月经）？", typeKey: "INSULIN" },
        { text: "您是否有中心性肥胖（腰围≥80cm）或体重较难减轻？", typeKey: "INSULIN" },
        { text: "您是否脸上反复长痤疮（尤其下巴、下颌线）或体毛增多？", typeKey: "INSULIN" },
        { text: "颈后、腋下等皮肤褶皱处是否有黑褐色天鹅绒样斑块（黑棘皮症）？", typeKey: "INSULIN" },
        { text: "是否曾被诊断为多囊卵巢综合征（PCOS）或卵巢多囊样改变？", typeKey: "INSULIN" },
        { text: "饭后常感到困倦、乏力，甚至需要小睡？", typeKey: "INSULIN" },
        { text: "您偏爱米饭、面条、甜食或含糖饮料吗？", typeKey: "INSULIN" },
        { text: "腹部脂肪堆积明显（苹果型身材）？", typeKey: "INSULIN" },
        { text: "空腹血糖、胰岛素或甘油三酯曾偏高？", typeKey: "INSULIN" },
        
        // 雌激素优势型 (ESTROGEN) 10题（包含周期过短相关：月经频发）
        { text: "您的月经周期经常短于21天（月经频发）？", typeKey: "ESTROGEN" },
        { text: "经前一周或经前出现乳房胀痛、触痛明显？", typeKey: "ESTROGEN" },
        { text: "月经量多（每1-2小时需换卫生巾）或经期超过7天？", typeKey: "ESTROGEN" },
        { text: "经前两天有褐色点滴出血（正式月经来潮前见红）？", typeKey: "ESTROGEN" },
        { text: "经期有血块且痛经程度较轻？", typeKey: "ESTROGEN" },
        { text: "有子宫肌瘤、子宫内膜息肉或乳腺增生/纤维囊性变病史？", typeKey: "ESTROGEN" },
        { text: "情绪容易波动、易怒或经前焦虑明显？", typeKey: "ESTROGEN" },
        { text: "曾使用含雌激素药物（如避孕药）后症状加重？", typeKey: "ESTROGEN" },
        { text: "经前出现水肿（体重上升、手脚肿胀）？", typeKey: "ESTROGEN" },
        { text: "长期便秘（每周排便少于3次）？", typeKey: "ESTROGEN" },
        
        // 甲状腺功能低下型 (THYROID) 9题
        { text: "经常怕冷、手脚冰凉，比别人穿得多？", typeKey: "THYROID" },
        { text: "容易疲劳、嗜睡，即使睡足8小时白天仍困倦？", typeKey: "THYROID" },
        { text: "体重增加且减肥困难（尤其伴随控制饮食仍胖）？", typeKey: "THYROID" },
        { text: "眉毛外侧变稀疏、脱发增多？", typeKey: "THYROID" },
        { text: "皮肤干燥、头发粗糙、指甲易断？", typeKey: "THYROID" },
        { text: "便秘（每周排便<3次）且腹胀常见？", typeKey: "THYROID" },
        { text: "月经周期不规律（可长可短，但以推迟为主）？", typeKey: "THYROID" },
        { text: "检查曾提示甲状腺功能减退（TSH升高）？", typeKey: "THYROID" },
        { text: "记忆力减退、反应变慢或情绪低落？", typeKey: "THYROID" },
        
        // 高泌乳素血症型 (PROLACTIN) 9题
        { text: "非哺乳期乳房能挤出乳汁样液体（溢乳）？", typeKey: "PROLACTIN" },
        { text: "月经稀发或闭经（≥3个月没有月经）？", typeKey: "PROLACTIN" },
        { text: "伴有经常性头痛或视觉模糊？", typeKey: "PROLACTIN" },
        { text: "性欲减退、阴道干涩（非更年期）？", typeKey: "PROLACTIN" },
        { text: "长期服用抗抑郁/抗精神病药物或胃药（甲氧氯普胺）？", typeKey: "PROLACTIN" },
        { text: "乳房胀痛特别严重且非经前也常有？", typeKey: "PROLACTIN" },
        { text: "压力大时溢乳或月经推迟更明显？", typeKey: "PROLACTIN" },
        { text: "曾诊断垂体微腺瘤或泌乳素偏高？", typeKey: "PROLACTIN" },
        { text: "咖啡因或高脂饮食后乳房不适感加重？", typeKey: "PROLACTIN" },
        
        // 炎症/前列腺素型痛经 (INFLAMM) 9题
        { text: "月经第一天或第二天出现严重下腹绞痛，需要吃止痛药？", typeKey: "INFLAMM" },
        { text: "痛经伴有恶心、呕吐或腹泻？", typeKey: "INFLAMM" },
        { text: "疼痛从月经来潮前几小时开始，持续12-72小时？", typeKey: "INFLAMM" },
        { text: "月经期间头痛、腰酸明显？", typeKey: "INFLAMM" },
        { text: "服用布洛芬或萘普生等止痛药后痛经显著缓解？", typeKey: "INFLAMM" },
        { text: "喜欢吃红肉、油炸食品或高Omega-6植物油（大豆油、玉米油）？", typeKey: "INFLAMM" },
        { text: "很少吃深海鱼（三文鱼、沙丁鱼等）？", typeKey: "INFLAMM" },
        { text: "经期血块较多且颜色暗红？", typeKey: "INFLAMM" },
        { text: "盆腔检查无异常（排除子宫肌瘤、内异症等）？", typeKey: "INFLAMM" },
        
        // 肠道菌群失调/雌激素再吸收型 (GUT_ESTRO) 9题
        { text: "长期便秘（每周<3次）且排便费力？", typeKey: "GUT_ESTRO" },
        { text: "经前/经期腹胀明显，排气增多？", typeKey: "GUT_ESTRO" },
        { text: "进食高纤维食物后腹胀不缓解反而加重？", typeKey: "GUT_ESTRO" },
        { text: "有抗生素使用史（尤其反复使用）？", typeKey: "GUT_ESTRO" },
        { text: "月经量多，经期延长，且伴有经间期出血？", typeKey: "GUT_ESTRO" },
        { text: "平时饮食中蔬菜、全谷物吃得很少，偏爱肉食？", typeKey: "GUT_ESTRO" },
        { text: "曾诊断子宫肌瘤或子宫内膜增生？", typeKey: "GUT_ESTRO" },
        { text: "大便气味较重或黏马桶？", typeKey: "GUT_ESTRO" },
        { text: "使用益生菌后腹胀/排便或经期不适有所改善？", typeKey: "GUT_ESTRO" },
        
        // 压力/HPA轴紊乱型 (STRESS) 10题（包含周期过短或不规律）
        { text: "月经周期随压力波动（加班、考试时推迟或提前，放松时恢复）？", typeKey: "STRESS" },
        { text: "长期感到焦虑、紧张或容易失眠？", typeKey: "STRESS" },
        { text: "容易疲劳、午后精力差，需要咖啡提神？", typeKey: "STRESS" },
        { text: "经前情绪波动剧烈（易怒、低落、哭泣）？", typeKey: "STRESS" },
        { text: "睡眠不足或熬夜后月经周期明显紊乱（可长可短）？", typeKey: "STRESS" },
        { text: "喜欢喝咖啡、浓茶或能量饮料？", typeKey: "STRESS" },
        { text: "经常低血糖（饭前心慌手抖、头晕）或加餐不规律？", typeKey: "STRESS" },
        { text: "体型偏瘦但腹部赘肉堆积（压力肥）？", typeKey: "STRESS" },
        { text: "早晨醒来仍感觉疲乏，晚上精神好？", typeKey: "STRESS" },
        { text: "休闲放松后月经周期变得规律些？", typeKey: "STRESS" }
    ];
    // 共计 5条症状 + 9+10+9+9+9+9+10 = 5+65=70？ 数一下: 症状5, INSULIN9, ESTROGEN10, THYROID9, PROLACTIN9, INFLAMM9, GUT_ESTRO9, STRESS10 = 5+65=70题。确保在合理范围内。

    // 选项分值定义（非症状题：0=从不,1=很少,2=有时,3=经常,4=总是）
    const optionLabels = ["从不", "很少", "有时", "经常", "总是"];
    
    let userAnswers = new Array(questions.length).fill(null); // 每题得分0-4，症状题存储选项索引（0~n）
    let symptoms = []; // 存储症状文本用于展示
    
    function initSymptoms() {
        // 初始化症状题答案存储为索引
        for(let i=0; i<questions.length; i++) {
            if(questions[i].isSymptom) {
                userAnswers[i] = null;
            }
        }
    }
    
    // DOM 元素
    const container = document.getElementById("questionsContainer");
    const submitBtn = document.getElementById("submitBtn");
    const resetBtn = document.getElementById("resetBtn");
    const resultDiv = document.getElementById("resultArea");
    const qCounterSpan = document.getElementById("qCounter");

    function renderQuestions() {
        container.innerHTML = "";
        let normalCount = 0;
        questions.forEach((q, idx) => {
            const card = document.createElement("div");
            card.className = "question-card";
            const qText = document.createElement("div");
            qText.className = "question-text";
            qText.innerText = `${idx+1}. ${q.text}`;
            card.appendChild(qText);
            
            const optionsDiv = document.createElement("div");
            optionsDiv.className = "options";
            let optList = q.isSymptom ? (q.optionsText || ["<21天","21-35天",">35天"]) : optionLabels;
            for (let val = 0; val < optList.length; val++) {
                const optDiv = document.createElement("div");
                optDiv.className = "opt-item";
                if (userAnswers[idx] === val) optDiv.classList.add("selected");
                const radio = document.createElement("input");
                radio.type = "radio";
                radio.name = `q${idx}`;
                radio.value = val;
                radio.id = `q${idx}_${val}`;
                radio.checked = (userAnswers[idx] === val);
                radio.addEventListener("change", (function(i, v) {
                    return function(e) {
                        if(e.target.checked) {
                            userAnswers[i] = v;
                            updateQuestionStyle(i, v);
                            updateCounter();
                        }
                    };
                })(idx, val));
                const label = document.createElement("label");
                label.htmlFor = `q${idx}_${val}`;
                label.innerText = optList[val];
                optDiv.appendChild(radio);
                optDiv.appendChild(label);
                optionsDiv.appendChild(optDiv);
            }
            card.appendChild(optionsDiv);
            container.appendChild(card);
        });
        updateCounter();
    }

    function updateQuestionStyle(index, val) {
        const card = container.children[index];
        if(card) {
            const options = card.querySelectorAll(".opt-item");
            options.forEach((opt, i) => {
                const radio = opt.querySelector("input");
                if(radio && parseInt(radio.value) === val) {
                    opt.classList.add("selected");
                } else {
                    opt.classList.remove("selected");
                }
            });
        }
    }

    function updateCounter() {
        const answered = userAnswers.filter(a => a !== null).length;
        qCounterSpan.innerText = `${answered} / ${questions.length} 已答`;
    }

    function resetAll() {
        userAnswers = new Array(questions.length).fill(null);
        renderQuestions();
        resultDiv.style.display = "none";
        resultDiv.innerHTML = "";
    }

    // 提取症状描述（用于结果展示）
    function getSymptomSummary() {
        let summary = [];
        // 周期
        const cycleIdx = userAnswers[0];
        if(cycleIdx !== undefined && cycleIdx !== null) {
            const cycleText = ["周期过短 (<21天)", "周期正常 (21-35天)", "周期偏长 (35-45天)", "周期>45天或闭经", "完全不规律"][cycleIdx];
            summary.push(`• 月经周期：${cycleText}`);
        }
        // 经期
        const durIdx = userAnswers[1];
        if(durIdx !== null) {
            const durText = ["<3天", "3-7天", ">7天"][durIdx];
            summary.push(`• 经期长度：${durText}`);
        }
        // 经量
        const volIdx = userAnswers[2];
        if(volIdx !== null) {
            const volText = ["很少（点滴）", "中等", "很多（频繁更换）", "大量血块"][volIdx];
            summary.push(`• 月经量：${volText}`);
        }
        // 痛经
        const painIdx = userAnswers[3];
        if(painIdx !== null) {
            const painText = ["无", "轻度", "中度（需止痛）", "重度（卧床）"][painIdx];
            summary.push(`• 痛经程度：${painText}`);
        }
        // 非经期出血
        const spottingIdx = userAnswers[4];
        if(spottingIdx !== null) {
            const spottingText = ["无", "偶尔有", "经常有"][spottingIdx];
            summary.push(`• 非经期出血：${spottingText}`);
        }
        return summary;
    }

    // 计算分型得分（忽略症状题）
    function computeScores() {
        let scores = {
            INSULIN: 0, ESTROGEN: 0, THYROID: 0, PROLACTIN: 0, INFLAMM: 0, GUT_ESTRO: 0, STRESS: 0
        };
        let counts = {
            INSULIN: 0, ESTROGEN: 0, THYROID: 0, PROLACTIN: 0, INFLAMM: 0, GUT_ESTRO: 0, STRESS: 0
        };
        for(let i=0; i<questions.length; i++) {
            const q = questions[i];
            if(q.isSymptom) continue;
            const score = userAnswers[i];
            if(score === null) continue;
            const type = q.typeKey;
            if(scores.hasOwnProperty(type)) {
                scores[type] += score;
                counts[type]++;
            }
        }
        let avgScores = {};
        for(let t in scores) {
            if(counts[t] > 0) avgScores[t] = scores[t] / counts[t];
            else avgScores[t] = 0;
        }
        return { avgScores, rawScores: scores, counts };
    }

    function displayResults() {
        const answeredCount = userAnswers.filter(a => a !== null).length;
        if(answeredCount < 30) {
            alert(`您只完成了${answeredCount}题（共${questions.length}题）。建议完成更多题目结果更准确（至少40题）。`);
            return;
        }
        const { avgScores } = computeScores();
        let sorted = Object.entries(avgScores).sort((a,b) => b[1] - a[1]);
        const topTypeKey = sorted[0][0];
        const topScore = sorted[0][1];
        const secondType = sorted[1]? sorted[1][0] : null;
        
        const symptomSummary = getSymptomSummary();
        const typeNames = {
            INSULIN: TYPES.INSULIN, ESTROGEN: TYPES.ESTROGEN, THYROID: TYPES.THYROID,
            PROLACTIN: TYPES.PROLACTIN, INFLAMM: TYPES.INFLAMM, GUT_ESTRO: TYPES.GUT_ESTRO, STRESS: TYPES.STRESS
        };
        const adviceMap = {
            INSULIN: "🌟 优先低GI/低升糖饮食，增加膳食纤维，补充肌醇、镁、铬，减少精制碳水。",
            ESTROGEN: "🌿 增加十字花科蔬菜(西兰花、羽衣甘蓝)、亚麻籽，限制红肉、酒精，促进肝脏雌激素代谢。",
            THYROID: "🦋 补充碘(碘盐、海带)、硒(巴西坚果)、锌；烹饪十字花科蔬菜，避免生大豆过量。",
            PROLACTIN: "💧 补充维生素B6(P-5-P)、维生素E；避免高脂饮食、酒精，管理压力，必要时检查泌乳素。",
            INFLAMM: "🔥 高Omega-3(鱼油)、低Omega-6，补充镁、B6；经前1周避免红肉/油炸。",
            GUT_ESTRO: "🦠 高纤维(洋车前子、亚麻籽)、益生菌(LGG、罗伊氏乳杆菌)、修复肠漏，改善便秘。",
            STRESS: "🧘 稳定血糖(规律加餐)、镁、B族、L-茶氨酸；腹式呼吸、适应原(南非醉茄)；戒咖啡因/酒精。"
        };
        
        let html = `<div class="result-title">📋 您的测评结果</div>`;
        if(symptomSummary.length) {
            html += `<div class="symptom-summary"><strong>📝 您的主要月经症状：</strong><br>${symptomSummary.join('<br>')}</div>`;
        }
        html += `<div class="top-type">✨ 最可能的类型：<strong>${typeNames[topTypeKey]}</strong> (匹配度评分: ${topScore.toFixed(1)}/4.0)</div>`;
        if(secondType && avgScores[secondType] > 2.0) {
            html += `<div style="margin-top: 8px;">⚠️ 次要倾向：${typeNames[secondType]} (${avgScores[secondType].toFixed(1)}分)，可能存在混合类型。</div>`;
        }
        html += `<hr><div><strong>🍎 针对性饮食调理建议：</strong><br>${adviceMap[topTypeKey]}</div><hr>`;
        html += `<div><strong>📊 各类型得分详情 (平均分/4)：</strong></div>`;
        for(let t in avgScores) {
            let percent = (avgScores[t] / 4 * 100).toFixed(0);
            html += `<div class="type-score">
                        <span class="type-name">${typeNames[t]}</span>
                        <div class="score-bar"><div class="score-fill" style="width: ${percent}%;"></div></div>
                        <span class="score-value">${avgScores[t].toFixed(1)}</span>
                    </div>`;
        }
        html += `<div style="margin-top: 1rem; font-size:0.85rem; background:#f3eae2; border-radius: 20px; padding:0.8rem;">
        💡 本测评结果仅作为饮食营养参考，不可替代医生诊断。如月经紊乱持续，请咨询妇科/内分泌医生。
        </div>`;
        resultDiv.innerHTML = html;
        resultDiv.style.display = "block";
        window.scrollTo({ top: resultDiv.offsetTop - 20, behavior: "smooth" });
    }

    function onSubmit() {
        const allAnswered = userAnswers.every(a => a !== null);
        if(!allAnswered) {
            const unansweredCount = userAnswers.filter(a => a === null).length;
            if(confirm(`还有 ${unansweredCount} 题未作答。未答题目会影响准确性，是否仍要继续查看结果？`)) {
                displayResults();
            }
        } else {
            displayResults();
        }
    }

    function init() {
        initSymptoms();
        renderQuestions();
        submitBtn.addEventListener("click", onSubmit);
        resetBtn.addEventListener("click", resetAll);
    }
    init();
</script>
</body>
</html>
